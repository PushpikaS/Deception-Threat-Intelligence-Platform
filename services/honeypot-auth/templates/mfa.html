<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify MFA - AcmeCorp</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
.card{background:#fff;border-radius:16px;padding:40px;width:400px}
h1{font-size:22px;color:#0f172a;margin-bottom:8px}
p{color:#64748b;font-size:14px;margin-bottom:20px}
input{width:100%;padding:14px;font-size:22px;letter-spacing:.3em;text-align:center;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:16px}
button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.error{color:#dc2626;font-size:13px;display:none;margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
<h1>Two-factor authentication</h1>
<p>Enter the verification code from your authenticator app.</p>
<div class="error" id="err">Invalid code. Try again.</div>
<input id="code" maxlength="6" placeholder="000000" inputmode="numeric" autocomplete="one-time-code">
<button id="verify">Verify</button>
<p style="margin-top:16px;font-size:12px;color:#94a3b8;text-align:center"><a href="/login" style="color:#2563eb">Back to sign in</a></p>
</div>
<script>
const redirect='{{REDIRECT}}';
const btn=document.getElementById('verify');
const errEl=document.getElementById('err');
const codeEl=document.getElementById('code');
function showErr(msg){errEl.textContent=msg;errEl.style.display='block'}
async function verify(){
if(btn.disabled)return;
const code=codeEl.value.trim();
if(code.length!==6){showErr('Enter a 6-digit code.');return}
btn.disabled=true;
errEl.style.display='none';
try{
const res=await fetch('/auth/mfa/verify',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({code,redirect})});
const data=await res.json().catch(()=>({}));
if(res.ok&&data.success){window.location=data.redirect||'/admin';return}
showErr(data.message||data.error||'Invalid code. Try again.');
btn.disabled=false;
}catch(err){showErr('Verification failed - try again.');btn.disabled=false}
}
btn.onclick=verify;
codeEl.addEventListener('keydown',e=>{if(e.key==='Enter')verify()});
</script>
</body>
</html>
