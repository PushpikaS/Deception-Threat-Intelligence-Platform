worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format honeypot '$remote_addr - [$time_local] "$request" $status '
                        'rt=$request_time svc=$upstream_addr';

    access_log /var/log/nginx/access.log honeypot;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=8r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=18r/s;
    limit_req_status 429;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Production client IP — trust X-Forwarded-For from Docker bridge / private load balancers
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.0/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # HTTP — deception gateway (login, admin, fake API)
    server {
        listen 80;
        server_name _;

        include /etc/nginx/honeypot-locations.conf;
    }
}