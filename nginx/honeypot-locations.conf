set $upstream_web honeypot-web:8080;
set $upstream_api honeypot-api:8081;
set $upstream_auth honeypot-auth:8082;

add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header X-Robots-Tag noindex always;

location = / {
    return 302 /login;
}

location /login {
    limit_req zone=auth_limit burst=12 nodelay;
    proxy_pass http://$upstream_auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /login/ {
    limit_req zone=auth_limit burst=12 nodelay;
    proxy_pass http://$upstream_auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /register {
    limit_req zone=auth_limit burst=12 nodelay;
    proxy_pass http://$upstream_auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /forgot-password {
    limit_req zone=auth_limit burst=12 nodelay;
    proxy_pass http://$upstream_auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /auth/ {
    limit_req zone=auth_limit burst=12 nodelay;
    proxy_pass http://$upstream_auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/admin(/.*)?$ {
    limit_req zone=global_limit burst=25 nodelay;
    proxy_pass http://$upstream_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /static/ {
    limit_req zone=global_limit burst=50 nodelay;
    proxy_pass http://$upstream_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /status {
    proxy_pass http://$upstream_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/(\.env|\.aws/credentials|\.git/HEAD|\.git/config|backup\.sql|robots\.txt|sitemap\.xml|config\.json|server-status|docker-compose\.yml|terraform\.tfstate|package\.json)$ {
    proxy_pass http://$upstream_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location /.well-known/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location /actuator/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location = /swagger.json { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location /debug/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location /wp-admin/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location /phpmyadmin/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }

location ~ ^/(jenkins|jira|confluence|grafana)(/|$) {
    proxy_pass http://$upstream_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
location /storage/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location /downloads/ { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location /upload { proxy_pass http://$upstream_web; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
location = /error { proxy_pass http://$upstream_web/error; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }

location /api/v1/ {
    limit_req zone=api_limit burst=35 nodelay;
    proxy_pass http://$upstream_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/ {
    return 404;
}

location /ws {
    return 404;
}

location = /favicon.ico {
    access_log off;
    return 204;
}

location /health {
    access_log off;
    return 200 '{"status":"healthy"}';
    add_header Content-Type application/json;
}

location /nginx-health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
}