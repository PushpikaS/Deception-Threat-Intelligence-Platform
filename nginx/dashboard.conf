worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format dashboard '$remote_addr - [$time_local] "$request" $status '
                         'rt=$request_time';

    access_log /var/log/nginx/access.log dashboard;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 4m;

    limit_req_zone $binary_remote_addr zone=dashboard_limit:10m rate=40r/s;
    limit_req_status 429;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP — threat intel UI + API
    server {
        listen 80;
        server_name _;

        include /etc/nginx/dashboard-locations.conf;
    }
}